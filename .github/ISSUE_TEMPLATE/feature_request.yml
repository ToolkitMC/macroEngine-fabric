name: Feature Request
description: Suggest a new module, command, or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What feature are you requesting?
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature needed? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Implementation
      description: If you have ideas for how to implement this, describe them here.

  - type: dropdown
    id: type
    attributes:
      label: Feature Type
      options:
        - New Module
        - New Command
        - Existing Module Improvement
        - Generator Template Change
        - Build / CI
        - Other
    validations:
      required: true
