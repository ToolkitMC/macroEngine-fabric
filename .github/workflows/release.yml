name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  # Node 20 desteği Eylül 2025'te sona erdiği için bu değişken 
  # eski aksiyonları Node 24 üzerinde çalışmaya zorlar.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Release oluşturabilmek için zorunludur

    steps:
      - name: Checkout
        uses: actions/checkout@v6 # 2026 başı itibarıyla v6 güncel sürümdür.

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4 # 'wrapper-validation-action' artık 'gradle/actions' altına taşındı.

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4 # Gradle 9.x tam desteği için v4.

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Get tag name
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3 # Nisan 2026 itibarıyla v3 sürümü Node 24 desteğiyle yayında.
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "MacroEngine Fabric ${{ steps.tag.outputs.tag }}"
          draft: false
          # Etiket '-pre' veya '-rc' içeriyorsa otomatik olarak 'Pre-release' işaretler.
          prerelease: ${{ contains(steps.tag.outputs.tag, '-pre') || contains(steps.tag.outputs.tag, '-rc') }}
          files: build/libs/*.jar
          generate_release_notes: true
          body: |
            ## MacroEngine Fabric ${{ steps.tag.outputs.tag }}

            ### Installation
            Drop the JAR into your Fabric server's `mods/` folder.

            ### Requirements
            - Fabric Loader ≥ 0.16.0
            - Fabric API
            - Minecraft 1.21.x
            - Java 21
