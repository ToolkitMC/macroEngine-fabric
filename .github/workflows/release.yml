name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build

      - name: Get tag name
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "MacroEngine Fabric ${{ steps.tag.outputs.tag }}"
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, '-pre') || contains(steps.tag.outputs.tag, '-rc') }}
          files: build/libs/*.jar
          body: |
            ## MacroEngine Fabric ${{ steps.tag.outputs.tag }}

            ### Installation
            Drop the JAR into your Fabric server's `mods/` folder.

            ### Requirements
            - Fabric Loader ≥ 0.16.0
            - Fabric API
            - Minecraft 1.21.x
            - Java 21
